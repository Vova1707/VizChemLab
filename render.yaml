services:
  # Service Backend
  - type: web
    name: vizchemlab-backend
    env: docker
    repo: https://github.com/VOTRE_USERNAME/VizChemLab.git
    rootDir: backend
    dockerfilePath: ./Dockerfile
    dockerContext: .
    healthCheckPath: /health
    plan: free
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: vizchemlab-db
          property: connectionString
      - key: SECRET_KEY
        sync: false
      - key: POSTGRES_USER
        value: vizchemlab
      - key: POSTGRES_PASSWORD
        sync: false
      - key: POSTGRES_DB
        value: vizchemlab
      - key: PYTHONPATH
        value: .

  # Service Frontend
  - type: web
    name: vizchemlab-frontend
    env: docker
    repo: https://github.com/VOTRE_USERNAME/VizChemLab.git
    rootDir: frontend
    dockerfilePath: ./Dockerfile.frontend
    dockerContext: .
    plan: free
    envVars:
      - key: VITE_API_URL
        value: https://vizchemlab-backend.onrender.com

databases:
  - name: vizchemlab-db
    plan: free
