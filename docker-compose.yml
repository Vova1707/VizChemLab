version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: vizchemlab-db
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-vizchemlab}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "0.0.0.0:5433:5432"

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: vizchemlab-backend
    restart: always
    depends_on:
      - db
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@db:5432/${POSTGRES_DB:-vizchemlab}
      SECRET_KEY: ${SECRET_KEY:-vizchemlab-production-secret-key-2024}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASSWORD: ${SMTP_PASSWORD:-}
      SERVER_HOST: 0.0.0.0
      SERVER_PORT: 8000
      GIGACHAT_CLIENT_ID: ${GIGACHAT_CLIENT_ID:-}
      GIGACHAT_AUTH_KEY: ${GIGACHAT_AUTH_KEY:-}
      PYTHONPATH: .
    ports:
      - "0.0.0.0:8000:8000"
    command: >
      sh -c "python manage_db.py seed && 
             python create_user.py && 
             python main.py"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.frontend
    container_name: vizchemlab-frontend
    restart: always
    depends_on:
      - backend
    ports:
      - "0.0.0.0:80:80"

volumes:
  postgres_data:
