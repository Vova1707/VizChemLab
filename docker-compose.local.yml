version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: vizchemlab-db-local
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-vizchemlab}
    volumes:
      - postgres_data_local:/var/lib/postgresql/data
    ports:
      - "0.0.0.0:5433:5432"

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: vizchemlab-backend-local
    restart: always
    depends_on:
      - db
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@db:5432/${POSTGRES_DB:-vizchemlab}
      SECRET_KEY: ${SECRET_KEY:-your-secret-key}
      SMTP_USER: ${SMTP_USER}
      SMTP_PASSWORD: ${SMTP_PASSWORD}
      SERVER_HOST: 0.0.0.0
      SERVER_PORT: 8000
      GIGACHAT_CLIENT_ID: ${GIGACHAT_CLIENT_ID}
      GIGACHAT_AUTH_KEY: ${GIGACHAT_AUTH_KEY}
      PYTHONPATH: .
    ports:
      - "0.0.0.0:8000:8000"
    command: >
      sh -c "python manage_db.py seed && 
             python main.py"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.local
    container_name: vizchemlab-frontend-local
    restart: always
    depends_on:
      - backend
    environment:
      - API_BACKEND_URL=http://backend:8000
    ports:
      - "0.0.0.0:80:80"

volumes:
  postgres_data_local:
