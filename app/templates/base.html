<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>FastAPI Template</title>
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
    <header>
        <nav>
            <a href="/">Главная</a>
            {% if not user %}
                <a href="/register">Регистрация</a>
                <a href="/login">Вход</a>
            {% else %}
            {% if user.is_admin %}
                <a href="/admin">Админка</a>
            {% endif %}
            <form method="post" action="/logout" style="display:inline;">
                <button type="submit" style="background:none; border:none; color:blue; cursor:pointer;">Выйти</button>
            </form>
            <a href="/profile" class="profile-link" title="Мой профиль">
                <img src="/static/icons/user.svg" alt="Профиль" width="20">
                <span>{{ user.username }}</span>
            </a>
            {% endif %}
        </nav>
    </header>

    <main>
        {% block content %}{% endblock %}
    </main>

    <footer>
        <p>&copy; 2025 FastAPI Template. Все права защищены.</p>
    </footer>
</body>
</html>
