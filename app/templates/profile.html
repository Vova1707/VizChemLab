{% extends "base.html" %}

{% block content %}
<h1>Мой профиль</h1>

<div style="max-width: 500px; margin: 2rem 0;">
    <p><strong>Имя пользователя:</strong> {{ user.username }}</p>
    <p><strong>Email:</strong> {{ user.email }}</p>
    <p><strong>Подтверждён:</strong> {% if user.is_verified %}Да{% else %}Нет{% endif %}</p>
    {% if user.is_admin %}
        <p><strong>Роль:</strong> Администратор</p>
    {% endif %}
</div>

<a href="/" style="display: inline-block; margin-top: 1rem;">← На главную</a>
{% endblock %}
