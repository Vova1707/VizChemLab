{% extends "base.html" %}
{% block content %}
<h1>Новый пароль</h1>
<form method="post" action="/reset-password">
    <input type="hidden" name="token" value="{{ token }}">
    <p>
        <label>Новый пароль: <input name="new_password" type="password" required minlength="6"></label>
    </p>
    <button type="submit">Сохранить</button>
</form>
<a href="/">← На главную</a>
{% endblock %}
